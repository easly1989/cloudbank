        warnings: { type: array, items: { type: string } }
      required: [walletId, counts, warnings]
    CSVPreviewRequest:
      type: object
      properties:
        accountId: { type: integer, format: int64 }
        content: { type: string, description: "the raw CSV text" }
        dialect: { type: string, enum: [homebank, generic] }
        delimiter: { type: string, description: "single character; defaults ';' (homebank) or ',' (generic)" }
        hasHeader: { type: boolean, description: "generic only: skip the first row" }
        dateFormat: { type: string, enum: ["", iso, dmy, mdy], description: "field order of the date column" }
        decimalChar: { type: string, description: "'.' or ','; defaults '.'" }
        mapping: { type: object, additionalProperties: { type: integer }, description: "generic: field name → column index" }
        applyRules: { type: boolean, description: "apply on-import assignment rules to the preview" }
      required: [accountId, content, dialect]
    CSVPreviewRow:
      type: object
      properties:
        line: { type: integer }
        include: { type: boolean }
        duplicate: { type: boolean }
        ruleApplied: { type: boolean }
        error: { type: string }
        date: { type: string }
        amount: { type: integer, format: int64 }
        paymentMode: { type: integer }
        info: { type: string }
        payee: { type: string }
        memo: { type: string }
        category: { type: string }
        tags: { type: array, items: { type: string } }
        importRef: { type: string, description: "OFX FITID, when present (used for duplicate detection)" }
      required: [line, include, duplicate, ruleApplied, date, amount, paymentMode, info, payee, memo, category, tags]
    ParsedPreviewRequest:
      type: object
      properties:
        accountId: { type: integer, format: int64 }
        content: { type: string, description: "the raw QIF or OFX text" }
        dateFormat: { type: string, enum: ["", iso, dmy, mdy], description: "QIF date field order; ignored for OFX" }
        applyRules: { type: boolean }
      required: [accountId, content]
    CSVPreview:
      type: object
      properties:
        columns: { type: array, items: { type: string }, description: "detected/generated column names for the mapping UI" }
        rows: { type: array, items: { $ref: "#/components/schemas/CSVPreviewRow" } }
      required: [columns, rows]
    CSVCommitRow:
      type: object
      properties:
        date: { type: string, description: "YYYY-MM-DD" }
        amount: { type: integer, format: int64 }
        paymentMode: { type: integer }
        info: { type: string }
        payee: { type: string }
        memo: { type: string }
        category: { type: string, description: "full name 'Parent:Sub' or empty" }
        tags: { type: array, items: { type: string } }
        importRef: { type: string, description: "OFX FITID to persist for future duplicate detection" }
      required: [date, amount]
    CSVCommitRequest:
      type: object
      properties:
        accountId: { type: integer, format: int64 }
        rows: { type: array, items: { $ref: "#/components/schemas/CSVCommitRow" } }
      required: [accountId, rows]
    CSVCommitResult:
      type: object
      properties:
        created: { type: integer }
      required: [created]
