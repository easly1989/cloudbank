        - { name: to, in: query, required: false, schema: { type: string } }
        - { name: status, in: query, required: false, schema: { type: integer } }
        - { name: payeeId, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: categoryId, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: tags, in: query, required: false, schema: { type: string }, description: "comma-separated" }
        - { name: amountMin, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: amountMax, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: text, in: query, required: false, schema: { type: string } }
        - { name: format, in: query, required: false, schema: { type: string, enum: [json, csv] } }
      responses:
        "200": { description: The report (JSON, or CSV when format=csv)., content: { application/json: { schema: { $ref: "#/components/schemas/StatisticsResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/wallets/{walletId}/reports/statistics/drilldown:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getStatisticsDrilldown
      summary: Filtered transactions belonging to one group bucket
      parameters:
        - { name: groupBy, in: query, required: true, schema: { type: string } }
        - { name: groupKey, in: query, required: true, schema: { type: string } }
        - { name: from, in: query, required: false, schema: { type: string } }
        - { name: to, in: query, required: false, schema: { type: string } }
        - { name: status, in: query, required: false, schema: { type: integer } }
        - { name: payeeId, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: categoryId, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: tags, in: query, required: false, schema: { type: string } }
        - { name: amountMin, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: amountMax, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: text, in: query, required: false, schema: { type: string } }
      responses:
        "200": { description: Transactions., content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/ReportTransaction" } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/wallets/{walletId}/reports/trend:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getTrend
      summary: Bucketed evolution over time, optionally split into series
      parameters:
        - { name: bucket, in: query, required: true, schema: { type: string, enum: [day, week, month, quarter, year] } }
        - { name: breakdown, in: query, required: false, schema: { type: string, enum: [none, account, payee, category] } }
        - { name: from, in: query, required: false, schema: { type: string } }
        - { name: to, in: query, required: false, schema: { type: string } }
        - { name: status, in: query, required: false, schema: { type: integer } }
        - { name: payeeId, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: categoryId, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: tags, in: query, required: false, schema: { type: string } }
        - { name: amountMin, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: amountMax, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: text, in: query, required: false, schema: { type: string } }
      responses:
        "200": { description: The trend., content: { application/json: { schema: { $ref: "#/components/schemas/TrendResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/wallets/{walletId}/reports/balance:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getBalanceReport
      summary: Account balance(s) over time (initial balance + transactions)
      parameters:
        - { name: bucket, in: query, required: true, schema: { type: string, enum: [day, week, month, quarter, year] } }
        - { name: accountIds, in: query, required: false, schema: { type: string }, description: "comma-separated; empty = all accounts" }
        - { name: from, in: query, required: false, schema: { type: string } }
        - { name: to, in: query, required: false, schema: { type: string } }
      responses:
        "200": { description: The balance report., content: { application/json: { schema: { $ref: "#/components/schemas/BalanceResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/wallets/{walletId}/reports/vehicle:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getVehicleReport
      summary: Fuel-consumption report for a vehicle category (memo d=/v=/p=)
      parameters:
        - { name: categoryId, in: query, required: true, schema: { type: integer, format: int64 } }
        - { name: from, in: query, required: false, schema: { type: string } }
        - { name: to, in: query, required: false, schema: { type: string } }
      responses:
        "200": { description: The report., content: { application/json: { schema: { $ref: "#/components/schemas/VehicleReport" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/wallets/{walletId}/dashboard:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getDashboard
      summary: Home-screen overview (accounts, base-currency totals, spending)
      parameters:
        - { name: from, in: query, required: false, schema: { type: string }, description: "spending range start (defaults to current month)" }
        - { name: to, in: query, required: false, schema: { type: string } }
        - { name: groupBy, in: query, required: false, schema: { type: string, enum: [category, payee], default: category }, description: "how the spending breakdown is bucketed" }
        - { name: ieMonths, in: query, required: false, schema: { type: integer, default: 12 }, description: "income/expense trailing window in months (0 = all dates)" }
      responses:
        "200": { description: The dashboard., content: { application/json: { schema: { $ref: "#/components/schemas/Dashboard" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/import/csv/preview:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: previewCSVImport
      summary: Parse a CSV, rescale amounts, flag duplicates and (optionally) apply import rules
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CSVPreviewRequest" }
      responses:
        "200": { description: The preview., content: { application/json: { schema: { $ref: "#/components/schemas/CSVPreview" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/import/qif/preview:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: previewQIFImport
      summary: Parse a QIF file, rescale amounts, flag duplicates and (optionally) apply import rules
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ParsedPreviewRequest" }
      responses:
        "200": { description: The preview., content: { application/json: { schema: { $ref: "#/components/schemas/CSVPreview" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/import/ofx/preview:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: previewOFXImport
      summary: Parse an OFX/QFX file (SGML or XML), flag duplicates by FITID and (optionally) apply import rules
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ParsedPreviewRequest" }
      responses:
        "200": { description: The preview., content: { application/json: { schema: { $ref: "#/components/schemas/CSVPreview" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/import/commit:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: commitImport
      summary: Create transactions from previewed rows (any format; creates payees/categories/tags by name)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CSVCommitRequest" }
      responses:
        "201": { description: The rows were imported., content: { application/json: { schema: { $ref: "#/components/schemas/CSVCommitResult" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/export/csv:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: exportAccountCSV
      summary: Export an account's transactions as a HomeBank-dialect CSV
      parameters:
        - { name: accountId, in: query, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: The CSV file., content: { text/csv: { schema: { type: string } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/export/qif:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: exportAccountQIF
      summary: Export an account's transactions as a QIF file
      parameters:
        - { name: accountId, in: query, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: The QIF file., content: { application/qif: { schema: { type: string } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/import/xhb:
    post:
      operationId: importXHB
      summary: Import a HomeBank .xhb file into a new wallet owned by the current user
      description: >
        The raw .xhb XML is sent as the request body. The import is atomic: a fresh
        wallet is created and populated with the file's currencies, accounts, payees,
        categories, tags, transactions (with splits and re-paired transfers),
        budgets, assignments, templates and schedules.
      requestBody:
        required: true
        content:
          application/xml:
            schema: { type: string, format: binary }
      responses:
        "201": { description: The file was imported., content: { application/json: { schema: { $ref: "#/components/schemas/ImportResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
components:
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Administrator access required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
          enum: [ok, unhealthy]
        error:
          type: string
      required: [status]
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required: [code, message]
      required: [error]
    User:
      type: object
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        email: { type: string }
        isAdmin: { type: boolean }
        locale: { type: string }
        theme: { type: string }
        preferences: { type: object, additionalProperties: true, description: "opaque UI preferences blob" }
        disabled: { type: boolean }
        createdAt: { type: string }
      required: [id, username, email, isAdmin, locale, theme, disabled, createdAt]
    UpdateMeRequest:
      type: object
      properties:
        locale: { type: string }
        theme: { type: string }
        preferences: { type: object, additionalProperties: true }
    IntegrityIssue:
      type: object
      properties:
        type: { type: string }
        description: { type: string }
        suggestion: { type: string }
        count: { type: integer }
        ids: { type: array, items: { type: integer, format: int64 } }
        fixable: { type: boolean }
      required: [type, description, suggestion, count, ids, fixable]
    Credentials:
      type: object
      properties:
        username: { type: string }
        email: { type: string }
        password: { type: string, minLength: 8 }
      required: [username, password]
    CreateUserRequest:
      type: object
      properties:
        username: { type: string }
        email: { type: string }
        password: { type: string, minLength: 8 }
        isAdmin: { type: boolean }
      required: [username, password]
    Wallet:
      type: object
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        ownerName: { type: string }
        baseCurrencyId: { type: integer, format: int64, nullable: true }
        role: { type: string, enum: [owner, member] }
        createdAt: { type: string }
        schedulePostMonths: { type: integer, description: "auto-post scheduled transactions up to N months ahead (0..3)" }
      required: [id, title, ownerName, role, createdAt, schedulePostMonths]
    WalletInput:
      type: object
      properties:
        title: { type: string }
        ownerName: { type: string }
        baseCurrency: { type: string, description: "ISO 4217 code for the base currency (create only)" }
        schedulePostMonths: { type: integer, description: "auto-post scheduled transactions up to N months ahead (0..3)" }
      required: [title]
    CatalogEntry:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        symbol: { type: string }
        fracDigits: { type: integer }
        symbolPrefix: { type: boolean }
      required: [code, name, symbol, fracDigits, symbolPrefix]
    Currency:
      type: object
      properties:
        id: { type: integer, format: int64 }
        isoCode: { type: string }
        name: { type: string }
        symbol: { type: string }
        symbolPrefix: { type: boolean }
        decimalChar: { type: string }
        groupChar: { type: string }
        fracDigits: { type: integer }
        isBase: { type: boolean }
        rate: { type: number }
        rateUpdatedAt: { type: string }
      required: [id, isoCode, name, symbol, symbolPrefix, decimalChar, groupChar, fracDigits, isBase, rate]
    AddCurrencyRequest:
      type: object
      properties:
        isoCode: { type: string }
        makeBase: { type: boolean }
      required: [isoCode]
    CurrencyUpdate:
      type: object
      properties:
        rate: { type: number }
        symbol: { type: string }
        symbolPrefix: { type: boolean }
        decimalChar: { type: string }
        groupChar: { type: string }
        fracDigits: { type: integer }
    ExchangeRate:
      type: object
      properties:
        date: { type: string }
        rate: { type: number }
        source: { type: string }
      required: [date, rate, source]
    Account:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        type:
          type: string
          enum: [bank, cash, checking, savings, creditcard, liability, asset, investment]
        currencyId: { type: integer, format: int64 }
        institution: { type: string }
        number: { type: string }
        initialBalance: { type: integer, format: int64, description: "minor units" }
        minimumBalance: { type: integer, format: int64, description: "minor units" }
        balance: { type: integer, format: int64, description: "today's balance (initial + transactions dated on/before today), minor units" }
        futureBalance: { type: integer, format: int64, description: "initial + all transactions incl. future-dated, minor units" }
        closed: { type: boolean }
        noSummary: { type: boolean }
        noBudget: { type: boolean }
        noReport: { type: boolean }
        position: { type: integer }
        groupName: { type: string }
        notes: { type: string }
        website: { type: string }
        createdAt: { type: string }
        currencyCode: { type: string }
        currencySymbol: { type: string }
        currencySymbolPrefix: { type: boolean }
        currencyDecimalChar: { type: string }
        currencyGroupChar: { type: string }
        currencyFracDigits: { type: integer }
      required:
        [id, name, type, currencyId, initialBalance, minimumBalance, balance, futureBalance, closed, position,
         currencyCode, currencySymbol, currencySymbolPrefix, currencyDecimalChar, currencyGroupChar, currencyFracDigits]
    AccountInput:
      type: object
      properties:
        name: { type: string }
        type:
          type: string
          enum: [bank, cash, checking, savings, creditcard, liability, asset, investment]
        currencyId: { type: integer, format: int64, description: "defaults to the wallet base currency" }
        institution: { type: string }
        number: { type: string }
        initialBalance: { type: integer, format: int64 }
        minimumBalance: { type: integer, format: int64 }
        closed: { type: boolean }
        noSummary: { type: boolean }
        noBudget: { type: boolean }
        noReport: { type: boolean }
        groupName: { type: string }
        notes: { type: string }
        website: { type: string }
      required: [name, type]
    Category:
      type: object
      properties:
        id: { type: integer, format: int64 }
        parentId: { type: integer, format: int64, nullable: true }
        name: { type: string }
        isIncome: { type: boolean }
        noBudget: { type: boolean }
        noReport: { type: boolean }
      required: [id, name, isIncome, noBudget, noReport]
    CategoryInput:
      type: object
      properties:
        name: { type: string }
        parentId: { type: integer, format: int64, nullable: true }
        isIncome: { type: boolean }
        noBudget: { type: boolean }
        noReport: { type: boolean }
      required: [name]
    CategoryUsage:
      type: object
      properties:
        subcategories: { type: integer, format: int64 }
        payees: { type: integer, format: int64 }
        transactions: { type: integer, format: int64 }
      required: [subcategories, payees, transactions]
    TagInfo:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        count: { type: integer, format: int64, description: "number of transactions using this tag" }
      required: [id, name, count]
    Payee:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        defaultCategoryId: { type: integer, format: int64, nullable: true }
        defaultPaymentMode: { type: integer, format: int64, nullable: true }
      required: [id, name]
    PayeeInput:
      type: object
      properties:
        name: { type: string }
        defaultCategoryId: { type: integer, format: int64, nullable: true }
        defaultPaymentMode: { type: integer, format: int64, nullable: true }
      required: [name]
    MergeRequest:
      type: object
      properties:
        targetId: { type: integer, format: int64 }
      required: [targetId]
    Split:
      type: object
      properties:
        categoryId: { type: integer, format: int64, nullable: true }
        amount: { type: integer, format: int64 }
        memo: { type: string }
      required: [amount]
    Transaction:
      type: object
      properties:
        id: { type: integer, format: int64 }
        accountId: { type: integer, format: int64 }
        date: { type: string }
        amount: { type: integer, format: int64 }
        paymentMode: { type: integer }
        status: { type: integer }
        info: { type: string }
        payeeId: { type: integer, format: int64, nullable: true }
        categoryId: { type: integer, format: int64, nullable: true }
        memo: { type: string }
        isSplit: { type: boolean }
        tags: { type: array, items: { type: string } }
        splits: { type: array, items: { $ref: "#/components/schemas/Split" } }
        payeeName: { type: string }
        categoryName: { type: string }
        transferId: { type: integer, format: int64, description: "set when the transaction is one leg of an internal transfer" }
        transferAccountId: { type: integer, format: int64, description: "the counterpart leg's account" }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, accountId, date, amount, paymentMode, status, info, memo, isSplit, tags]
    TransactionInput:
      type: object
      properties:
        accountId: { type: integer, format: int64 }
        date: { type: string, description: "YYYY-MM-DD" }
        amount: { type: integer, format: int64, description: "signed minor units" }
        paymentMode: { type: integer, description: "0..11" }
        status: { type: integer, description: "0 none, 1 cleared, 2 reconciled, 3 remind, 4 void" }
        info: { type: string }
        payeeId: { type: integer, format: int64, nullable: true }
        categoryId: { type: integer, format: int64, nullable: true }
        memo: { type: string }
        tags: { type: array, items: { type: string } }
        splits: { type: array, items: { $ref: "#/components/schemas/Split" } }
      required: [accountId, date, amount]
    RegisterRow:
      allOf:
        - $ref: "#/components/schemas/Transaction"
        - type: object
          properties:
            runningBalance: { type: integer, format: int64, description: "initial balance + cumulative amount through this row (chronological)" }
          required: [runningBalance]
    RegisterSummary:
      type: object
      properties:
        bank: { type: integer, format: int64, description: "initial + cleared/reconciled amounts" }
        today: { type: integer, format: int64, description: "initial + amounts dated on or before today" }
        future: { type: integer, format: int64, description: "initial + all amounts" }
      required: [bank, today, future]
    Template:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        accountId: { type: integer, format: int64, nullable: true }
        amount: { type: integer, format: int64 }
        paymentMode: { type: integer }
        status: { type: integer }
        info: { type: string }
        payeeId: { type: integer, format: int64, nullable: true }
        categoryId: { type: integer, format: int64, nullable: true }
        memo: { type: string }
        tags: { type: array, items: { type: string } }
        isSplit: { type: boolean }
        isTransfer: { type: boolean }
        toAccountId: { type: integer, format: int64, nullable: true }
        splits: { type: array, items: { $ref: "#/components/schemas/Split" } }
        createdAt: { type: string }
      required: [id, name, amount, paymentMode, status, info, memo, tags, isSplit, isTransfer, createdAt]
    TemplateInput:
      type: object
      properties:
        name: { type: string }
        accountId: { type: integer, format: int64, nullable: true }
        amount: { type: integer, format: int64, description: "signed minor units" }
        paymentMode: { type: integer }
        status: { type: integer }
        info: { type: string }
        payeeId: { type: integer, format: int64, nullable: true }
        categoryId: { type: integer, format: int64, nullable: true }
        memo: { type: string }
        tags: { type: array, items: { type: string } }
        isTransfer: { type: boolean }
        toAccountId: { type: integer, format: int64, nullable: true }
        splits: { type: array, items: { $ref: "#/components/schemas/Split" } }
      required: [name]
    CurrencyInfo:
      type: object
      properties:
        code: { type: string }
        symbol: { type: string }
        symbolPrefix: { type: boolean }
        decimalChar: { type: string }
        groupChar: { type: string }
        fracDigits: { type: integer }
      required: [code, symbol, symbolPrefix, decimalChar, groupChar, fracDigits]
    RateRefreshResult:
      type: object
      properties:
        date: { type: string, description: "provider quotation date (YYYY-MM-DD), when available" }
        updated: { type: array, items: { type: string }, description: "ISO codes refreshed from the provider" }
        unsupported: { type: array, items: { type: string }, description: "wallet currencies the provider does not cover (kept manual)" }
        providerError: { type: string, description: "set when the provider was unreachable or the base is unsupported; manual rates are kept" }
      required: [date, updated, unsupported]
    AccountSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        type: { type: string }
        groupName: { type: string }
