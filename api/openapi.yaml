openapi: 3.1.0
info:
  title: CloudBank API
  version: 0.1.0
  description: >
    HTTP API for CloudBank, a self-hosted web port of HomeBank. This document is
    the single source of truth for the contract: the Go server interfaces and
    the TypeScript client types are both generated from it. Resources are added
    milestone by milestone; this initial version covers the health and ping
    endpoints established by the server skeleton.
  license:
    name: AGPL-3.0-or-later
    url: https://www.gnu.org/licenses/agpl-3.0.html
servers:
  - url: /
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness/readiness probe
      description: Returns 200 when the server (and its database, once wired) is healthy.
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: A dependency is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /api/v1/ping:
    get:
      operationId: getPing
      summary: Connectivity check
      responses:
        "200":
          description: Pong.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: pong
                required: [message]
  /api/v1/setup/status:
    get:
      operationId: getSetupStatus
      summary: First-run setup status
      description: Reports whether the instance has no users yet and needs the setup wizard.
      security: []
      responses:
        "200":
          description: Setup status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  needsSetup:
                    type: boolean
                required: [needsSetup]
  /api/v1/setup:
    post:
      operationId: postSetup
      summary: Create the first (admin) user
      description: Allowed only when no user exists yet; creates an administrator and starts a session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Credentials"
      responses:
        "201":
          description: Admin created and logged in.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400": { $ref: "#/components/responses/BadRequest" }
        "409":
          description: Setup has already been completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/auth/login:
    post:
      operationId: login
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Credentials"
      responses:
        "200":
          description: Logged in.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429":
          description: Too many attempts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Log out (revoke the current session)
      responses:
        "204":
          description: Logged out.
  /api/v1/auth/me:
    get:
      operationId: getMe
      summary: Current authenticated user
      responses:
        "200":
          description: The current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      operationId: updateMe
      summary: Update the current user's language, theme and UI preferences
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeRequest" }
      responses:
        "200": { description: The updated user., content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/admin/backup:
    get:
      operationId: hotBackup
      summary: Download a consistent copy of the whole database (admin only)
      responses:
        "200": { description: A SQLite database file., content: { application/octet-stream: { schema: { type: string, format: binary } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/backup/restore:
    post:
      operationId: restoreBackup
      summary: Restore a wallet backup JSON into a brand-new wallet
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "201": { description: The wallet was restored., content: { application/json: { schema: { type: object, properties: { walletId: { type: integer, format: int64 } }, required: [walletId] } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/wallets/{walletId}/backup:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: exportWalletBackup
      summary: Download a self-contained JSON backup of the wallet
      responses:
        "200": { description: The backup document., content: { application/json: { schema: { type: object, additionalProperties: true } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/export/xhb:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: exportWalletXHB
      summary: Download the wallet as a HomeBank .xhb file
      responses:
        "200": { description: The HomeBank file., content: { application/x-homebank: { schema: { type: string, format: binary } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/integrity:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: checkIntegrity
      summary: Run the wallet anomaly check
      responses:
        "200": { description: The issues found., content: { application/json: { schema: { type: object, properties: { issues: { type: array, items: { $ref: "#/components/schemas/IntegrityIssue" } } }, required: [issues] } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/integrity/fix:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: fixIntegrity
      summary: Apply the automatic fix for a fixable issue type
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { type: { type: string } }, required: [type] }
      responses:
        "200": { description: The fix result., content: { application/json: { schema: { type: object, properties: { fixed: { type: integer } }, required: [fixed] } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/admin/users:
    get:
      operationId: listUsers
      summary: List users (admin)
      responses:
        "200":
          description: All users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createUser
      summary: Create a user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Username already taken.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/admin/users/{id}/disable:
    post:
      operationId: setUserDisabled
      summary: Enable or disable a user (admin)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                disabled: { type: boolean }
              required: [disabled]
      responses:
        "204": { description: Updated. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/admin/users/{id}/password:
    post:
      operationId: resetUserPassword
      summary: Reset a user's password (admin)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password: { type: string, minLength: 8 }
              required: [password]
      responses:
        "204": { description: Password reset. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/wallets:
    get:
      operationId: listWallets
      summary: List the current user's wallets
      responses:
        "200":
          description: The user's wallets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Wallet"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: createWallet
      summary: Create a wallet (creator becomes owner)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletInput"
      responses:
        "201":
          description: Wallet created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/wallets/{walletId}:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getWallet
      summary: Get a wallet
      responses:
        "200":
          description: The wallet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateWallet
      summary: Rename a wallet (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletInput"
      responses:
        "200":
          description: Updated wallet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteWallet
      summary: Delete a wallet and all its data (owner only)
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/catalog/currencies:
    get:
      operationId: getCurrencyCatalog
      summary: The ISO 4217 currency catalog
      responses:
        "200":
          description: Catalog entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogEntry"
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/wallets/{walletId}/currencies:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: listCurrencies
      summary: List a wallet's currencies
      responses:
        "200":
          description: Currencies (base first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Currency"
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: addCurrency
      summary: Add a currency to a wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCurrencyRequest"
      responses:
        "201":
          description: Currency added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Currency"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Currency already added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/wallets/{walletId}/currencies/{currencyId}:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: currencyId, in: path, required: true, schema: { type: integer, format: int64 } }
    patch:
      operationId: updateCurrency
      summary: Update a currency's rate and/or formatting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CurrencyUpdate"
      responses:
        "200":
          description: Updated currency.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Currency"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteCurrency
      summary: Remove a currency (not the base)
      responses:
        "204": { description: Deleted. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/currencies/refresh:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: refreshRates
      summary: Fetch the latest online exchange rates (ECB via frankfurter.app)
      description: >
        Updates the wallet's non-base currencies from the online provider and
        records history. Always returns 200: if the provider is unreachable or
        does not support the base currency, manual rates are kept and
        providerError is set. Currencies the provider does not cover are listed
        in unsupported and remain manual.
      responses:
        "200": { description: The refresh result., content: { application/json: { schema: { $ref: "#/components/schemas/RateRefreshResult" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/currencies/{currencyId}/base:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: currencyId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: setBaseCurrency
      summary: Make a currency the wallet's base
      responses:
        "204": { description: Base currency set. }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/currencies/{currencyId}/rates:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: currencyId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getCurrencyRates
      summary: A currency's exchange-rate history
      responses:
        "200":
          description: Rate history (newest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExchangeRate"
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/accounts:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: listAccounts
      summary: List a wallet's accounts
      responses:
        "200":
          description: Accounts (ordered by position/group/name).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createAccount
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Account name already used.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/wallets/{walletId}/accounts/reorder:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: reorderAccounts
      summary: Reorder accounts (positions and groups)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  id: { type: integer, format: int64 }
                  position: { type: integer }
                  groupName: { type: string }
                required: [id, position]
      responses:
        "204": { description: Reordered. }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/accounts/{accountId}:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: accountId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getAccount
      summary: Get an account
      responses:
        "200":
          description: The account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateAccount
      summary: Update an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "200":
          description: Updated account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Account name already used.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteAccount
      summary: Delete an account and its data
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/categories:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: listCategories
      summary: List a wallet's categories (two-level)
      responses:
        "200":
          description: Categories.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Category" } }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createCategory
      summary: Create a category or subcategory
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { description: Duplicate name., content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /api/v1/wallets/{walletId}/categories/{categoryId}:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: categoryId, in: path, required: true, schema: { type: integer, format: int64 } }
    patch:
      operationId: updateCategory
      summary: Rename/retype a category
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryInput" }
      responses:
        "200": { description: Updated., content: { application/json: { schema: { $ref: "#/components/schemas/Category" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteCategory
      summary: Delete a category (optionally reassigning references)
      parameters:
        - { name: reassignTo, in: query, required: false, schema: { type: integer, format: int64 } }
      responses:
        "204": { description: Deleted. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Has subcategories., content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /api/v1/wallets/{walletId}/categories/{categoryId}/usage:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: categoryId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getCategoryUsage
      summary: Reference counts for a category
      responses:
        "200": { description: Usage., content: { application/json: { schema: { $ref: "#/components/schemas/CategoryUsage" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/categories/{categoryId}/merge:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: categoryId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: mergeCategory
      summary: Merge a category into another
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MergeRequest" }
      responses:
        "204": { description: Merged. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/payees:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: listPayees
      summary: List a wallet's payees
      responses:
        "200": { description: Payees., content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Payee" } } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createPayee
      summary: Create a payee
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PayeeInput" }
      responses:
        "201": { description: Created., content: { application/json: { schema: { $ref: "#/components/schemas/Payee" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { description: Duplicate name., content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /api/v1/wallets/{walletId}/payees/{payeeId}:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: payeeId, in: path, required: true, schema: { type: integer, format: int64 } }
    patch:
      operationId: updatePayee
      summary: Update a payee
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PayeeInput" }
      responses:
        "200": { description: Updated., content: { application/json: { schema: { $ref: "#/components/schemas/Payee" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deletePayee
      summary: Delete a payee
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/payees/{payeeId}/merge:
    parameters:
