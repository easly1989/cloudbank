        setPaymentMode: { type: integer, nullable: true }
        setInfo: { type: string, nullable: true }
        applyOnManual: { type: boolean }
        applyOnImport: { type: boolean }
      required: [id, position, matchField, matchType, pattern, caseSensitive, applyOnManual, applyOnImport]
    AssignmentInput:
      type: object
      properties:
        matchField: { type: string, enum: [memo, payee, both] }
        matchType: { type: string, enum: [exact, contains, regex] }
        pattern: { type: string }
        caseSensitive: { type: boolean }
        matchAccountId: { type: integer, format: int64, nullable: true }
        setPayeeId: { type: integer, format: int64, nullable: true }
        setCategoryId: { type: integer, format: int64, nullable: true }
        setPaymentMode: { type: integer, nullable: true }
        setInfo: { type: string, nullable: true }
