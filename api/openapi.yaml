        toAccountId: { type: integer, format: int64 }
        date: { type: string }
        fromAmount: { type: integer, format: int64, description: "positive magnitude in the source account currency" }
        toAmount: { type: integer, format: int64, description: "positive magnitude in the destination account currency" }
        memo: { type: string }
        status: { type: integer }
        txnFromId: { type: integer, format: int64 }
        txnToId: { type: integer, format: int64 }
      required: [id, fromAccountId, toAccountId, date, fromAmount, toAmount, memo, status, txnFromId, txnToId]
    TransferInput:
      type: object
      properties:
        fromAccountId: { type: integer, format: int64 }
        toAccountId: { type: integer, format: int64 }
        date: { type: string, description: "YYYY-MM-DD" }
        fromAmount: { type: integer, format: int64, description: "positive minor units in the source currency" }
        toAmount: { type: integer, format: int64, description: "positive minor units in the destination currency; defaults to fromAmount" }
        memo: { type: string }
        status: { type: integer, description: "0 none, 1 cleared, 2 reconciled, 3 remind, 4 void" }
      required: [fromAccountId, toAccountId, date, fromAmount]
    ImportResult:
      type: object
      properties:
        walletId: { type: integer, format: int64, description: "the newly created wallet" }
