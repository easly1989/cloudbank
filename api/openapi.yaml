        id: { type: integer, format: int64 }
        templateId: { type: integer, format: int64 }
        templateName: { type: string }
        templateAmount: { type: integer, format: int64 }
        templateIsTransfer: { type: boolean }
        unit: { type: string, enum: [day, week, month, year] }
        everyN: { type: integer }
        nextDue: { type: string }
        weekendMode: { type: integer, description: "0 none, 1 before, 2 after, 3 skip" }
        remaining: { type: integer, format: int64, nullable: true }
        postAdvance: { type: integer }
        autoPost: { type: boolean }
        lastPosted: { type: string }
      required: [id, templateId, templateName, templateAmount, templateIsTransfer, unit, everyN, nextDue, weekendMode, postAdvance, autoPost]
    ScheduleInput:
      type: object
      properties:
        templateId: { type: integer, format: int64 }
        unit: { type: string, enum: [day, week, month, year] }
        everyN: { type: integer, description: "every N units, >= 1" }
        nextDue: { type: string, description: "YYYY-MM-DD" }
        weekendMode: { type: integer, description: "0 none, 1 before, 2 after, 3 skip" }
        remaining: { type: integer, format: int64, nullable: true, description: "occurrence limit; null = unlimited" }
        postAdvance: { type: integer, description: "post this many days early" }
        autoPost: { type: boolean }
      required: [templateId, unit, everyN, nextDue]
    Assignment:
