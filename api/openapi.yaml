openapi: 3.1.0
info:
  title: CloudBank API
  version: 0.1.0
  description: >
    HTTP API for CloudBank, a self-hosted web port of HomeBank. This document is
    the single source of truth for the contract: the Go server interfaces and
    the TypeScript client types are both generated from it. Resources are added
    milestone by milestone; this initial version covers the health and ping
    endpoints established by the server skeleton.
  license:
    name: AGPL-3.0-or-later
    url: https://www.gnu.org/licenses/agpl-3.0.html
servers:
  - url: /
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness/readiness probe
      description: Returns 200 when the server (and its database, once wired) is healthy.
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: A dependency is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /api/v1/ping:
    get:
      operationId: getPing
      summary: Connectivity check
      responses:
        "200":
          description: Pong.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: pong
                required: [message]
  /api/v1/setup/status:
    get:
      operationId: getSetupStatus
      summary: First-run setup status
      description: Reports whether the instance has no users yet and needs the setup wizard.
      security: []
      responses:
        "200":
          description: Setup status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  needsSetup:
                    type: boolean
                required: [needsSetup]
  /api/v1/setup:
    post:
      operationId: postSetup
      summary: Create the first (admin) user
      description: Allowed only when no user exists yet; creates an administrator and starts a session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Credentials"
      responses:
        "201":
          description: Admin created and logged in.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400": { $ref: "#/components/responses/BadRequest" }
        "409":
          description: Setup has already been completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/auth/login:
    post:
      operationId: login
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Credentials"
      responses:
        "200":
          description: Logged in.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429":
          description: Too many attempts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Log out (revoke the current session)
      responses:
        "204":
          description: Logged out.
  /api/v1/auth/me:
    get:
      operationId: getMe
      summary: Current authenticated user
      responses:
        "200":
          description: The current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/admin/users:
    get:
      operationId: listUsers
      summary: List users (admin)
      responses:
        "200":
          description: All users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createUser
      summary: Create a user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Username already taken.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/admin/users/{id}/disable:
    post:
      operationId: setUserDisabled
      summary: Enable or disable a user (admin)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                disabled: { type: boolean }
              required: [disabled]
      responses:
        "204": { description: Updated. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/admin/users/{id}/password:
    post:
      operationId: resetUserPassword
      summary: Reset a user's password (admin)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password: { type: string, minLength: 8 }
              required: [password]
      responses:
        "204": { description: Password reset. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/wallets:
    get:
      operationId: listWallets
      summary: List the current user's wallets
      responses:
        "200":
          description: The user's wallets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Wallet"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: createWallet
      summary: Create a wallet (creator becomes owner)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletInput"
      responses:
        "201":
          description: Wallet created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/wallets/{walletId}:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getWallet
      summary: Get a wallet
      responses:
        "200":
          description: The wallet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateWallet
      summary: Rename a wallet (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletInput"
      responses:
        "200":
          description: Updated wallet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteWallet
      summary: Delete a wallet and all its data (owner only)
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/catalog/currencies:
    get:
      operationId: getCurrencyCatalog
      summary: The ISO 4217 currency catalog
      responses:
        "200":
          description: Catalog entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogEntry"
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/wallets/{walletId}/currencies:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: listCurrencies
      summary: List a wallet's currencies
      responses:
        "200":
          description: Currencies (base first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Currency"
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: addCurrency
      summary: Add a currency to a wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCurrencyRequest"
      responses:
        "201":
          description: Currency added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Currency"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Currency already added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/wallets/{walletId}/currencies/{currencyId}:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: currencyId, in: path, required: true, schema: { type: integer, format: int64 } }
    patch:
      operationId: updateCurrency
      summary: Update a currency's rate and/or formatting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CurrencyUpdate"
      responses:
        "200":
          description: Updated currency.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Currency"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteCurrency
      summary: Remove a currency (not the base)
      responses:
        "204": { description: Deleted. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/currencies/{currencyId}/base:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: currencyId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: setBaseCurrency
      summary: Make a currency the wallet's base
      responses:
        "204": { description: Base currency set. }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/currencies/{currencyId}/rates:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: currencyId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getCurrencyRates
      summary: A currency's exchange-rate history
      responses:
        "200":
          description: Rate history (newest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExchangeRate"
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/accounts:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: listAccounts
      summary: List a wallet's accounts
      responses:
        "200":
          description: Accounts (ordered by position/group/name).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createAccount
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Account name already used.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/wallets/{walletId}/accounts/reorder:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: reorderAccounts
      summary: Reorder accounts (positions and groups)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  id: { type: integer, format: int64 }
                  position: { type: integer }
                  groupName: { type: string }
                required: [id, position]
      responses:
        "204": { description: Reordered. }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/accounts/{accountId}:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: accountId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getAccount
      summary: Get an account
      responses:
        "200":
          description: The account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateAccount
      summary: Update an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "200":
          description: Updated account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Account name already used.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteAccount
      summary: Delete an account and its data
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/categories:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: listCategories
      summary: List a wallet's categories (two-level)
      responses:
        "200":
          description: Categories.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Category" } }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createCategory
      summary: Create a category or subcategory
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { description: Duplicate name., content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /api/v1/wallets/{walletId}/categories/{categoryId}:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: categoryId, in: path, required: true, schema: { type: integer, format: int64 } }
    patch:
      operationId: updateCategory
      summary: Rename/retype a category
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryInput" }
      responses:
        "200": { description: Updated., content: { application/json: { schema: { $ref: "#/components/schemas/Category" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteCategory
      summary: Delete a category (optionally reassigning references)
      parameters:
        - { name: reassignTo, in: query, required: false, schema: { type: integer, format: int64 } }
      responses:
        "204": { description: Deleted. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Has subcategories., content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /api/v1/wallets/{walletId}/categories/{categoryId}/usage:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: categoryId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getCategoryUsage
      summary: Reference counts for a category
      responses:
        "200": { description: Usage., content: { application/json: { schema: { $ref: "#/components/schemas/CategoryUsage" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/categories/{categoryId}/merge:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: categoryId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: mergeCategory
      summary: Merge a category into another
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MergeRequest" }
      responses:
        "204": { description: Merged. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/payees:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: listPayees
      summary: List a wallet's payees
      responses:
        "200": { description: Payees., content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Payee" } } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createPayee
      summary: Create a payee
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PayeeInput" }
      responses:
        "201": { description: Created., content: { application/json: { schema: { $ref: "#/components/schemas/Payee" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { description: Duplicate name., content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /api/v1/wallets/{walletId}/payees/{payeeId}:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: payeeId, in: path, required: true, schema: { type: integer, format: int64 } }
    patch:
      operationId: updatePayee
      summary: Update a payee
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PayeeInput" }
      responses:
        "200": { description: Updated., content: { application/json: { schema: { $ref: "#/components/schemas/Payee" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deletePayee
      summary: Delete a payee
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/payees/{payeeId}/merge:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: payeeId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: mergePayee
      summary: Merge a payee into another
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MergeRequest" }
      responses:
        "204": { description: Merged. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/tags:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: listTags
      summary: List a wallet's tags
      responses:
        "200": { description: Tags., content: { application/json: { schema: { type: array, items: { type: string } } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/transactions:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: listTransactions
      summary: List an account's transactions (newest first)
      parameters:
        - { name: accountId, in: query, required: true, schema: { type: integer, format: int64 } }
        - { name: limit, in: query, required: false, schema: { type: integer } }
        - { name: offset, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: A page of transactions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions: { type: array, items: { $ref: "#/components/schemas/Transaction" } }
                  total: { type: integer, format: int64 }
                required: [transactions, total]
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createTransaction
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransactionInput" }
      responses:
        "201": { description: Created., content: { application/json: { schema: { $ref: "#/components/schemas/Transaction" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/transactions/duplicates:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: findDuplicateTransactions
      summary: Find possible duplicate transactions (same account/amount near a date)
      parameters:
        - { name: accountId, in: query, required: true, schema: { type: integer, format: int64 } }
        - { name: date, in: query, required: true, schema: { type: string } }
        - { name: amount, in: query, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: Candidates., content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Transaction" } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/transactions/{transactionId}:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: transactionId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getTransaction
      summary: Get a transaction (with splits and tags)
      responses:
        "200": { description: The transaction., content: { application/json: { schema: { $ref: "#/components/schemas/Transaction" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateTransaction
      summary: Update a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransactionInput" }
      responses:
        "200": { description: Updated., content: { application/json: { schema: { $ref: "#/components/schemas/Transaction" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteTransaction
      summary: Delete a transaction
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/transfers:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      operationId: createTransfer
      summary: Create an internal transfer (two linked transaction legs)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransferInput" }
      responses:
        "201": { description: Created., content: { application/json: { schema: { $ref: "#/components/schemas/Transfer" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/wallets/{walletId}/transfers/{transferId}:
    parameters:
      - { name: walletId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: transferId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      operationId: getTransfer
      summary: Get an internal transfer
      responses:
        "200": { description: The transfer., content: { application/json: { schema: { $ref: "#/components/schemas/Transfer" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateTransfer
      summary: Update an internal transfer (date and amounts; accounts are fixed)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransferInput" }
      responses:
        "200": { description: Updated., content: { application/json: { schema: { $ref: "#/components/schemas/Transfer" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteTransfer
      summary: Delete an internal transfer (removes both legs)
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/NotFound" }
components:
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Administrator access required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
          enum: [ok, unhealthy]
        error:
          type: string
      required: [status]
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required: [code, message]
      required: [error]
    User:
      type: object
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        email: { type: string }
        isAdmin: { type: boolean }
        locale: { type: string }
        theme: { type: string }
        disabled: { type: boolean }
        createdAt: { type: string }
      required: [id, username, email, isAdmin, locale, theme, disabled, createdAt]
    Credentials:
      type: object
      properties:
        username: { type: string }
        email: { type: string }
        password: { type: string, minLength: 8 }
      required: [username, password]
    CreateUserRequest:
      type: object
      properties:
        username: { type: string }
        email: { type: string }
        password: { type: string, minLength: 8 }
        isAdmin: { type: boolean }
      required: [username, password]
    Wallet:
      type: object
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        ownerName: { type: string }
        baseCurrencyId: { type: integer, format: int64, nullable: true }
        role: { type: string, enum: [owner, member] }
        createdAt: { type: string }
      required: [id, title, ownerName, role, createdAt]
    WalletInput:
      type: object
      properties:
        title: { type: string }
        ownerName: { type: string }
        baseCurrency: { type: string, description: "ISO 4217 code for the base currency (create only)" }
      required: [title]
    CatalogEntry:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        symbol: { type: string }
        fracDigits: { type: integer }
        symbolPrefix: { type: boolean }
      required: [code, name, symbol, fracDigits, symbolPrefix]
    Currency:
      type: object
      properties:
        id: { type: integer, format: int64 }
        isoCode: { type: string }
        name: { type: string }
        symbol: { type: string }
        symbolPrefix: { type: boolean }
        decimalChar: { type: string }
        groupChar: { type: string }
        fracDigits: { type: integer }
        isBase: { type: boolean }
        rate: { type: number }
        rateUpdatedAt: { type: string }
      required: [id, isoCode, name, symbol, symbolPrefix, decimalChar, groupChar, fracDigits, isBase, rate]
    AddCurrencyRequest:
      type: object
      properties:
        isoCode: { type: string }
        makeBase: { type: boolean }
      required: [isoCode]
    CurrencyUpdate:
      type: object
      properties:
        rate: { type: number }
        symbol: { type: string }
        symbolPrefix: { type: boolean }
        decimalChar: { type: string }
        groupChar: { type: string }
        fracDigits: { type: integer }
    ExchangeRate:
      type: object
      properties:
        date: { type: string }
        rate: { type: number }
        source: { type: string }
      required: [date, rate, source]
    Account:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        type:
          type: string
          enum: [bank, cash, checking, savings, creditcard, liability, asset, investment]
        currencyId: { type: integer, format: int64 }
        institution: { type: string }
        number: { type: string }
        initialBalance: { type: integer, format: int64, description: "minor units" }
        minimumBalance: { type: integer, format: int64, description: "minor units" }
        balance: { type: integer, format: int64, description: "minor units" }
        closed: { type: boolean }
        noSummary: { type: boolean }
        noBudget: { type: boolean }
        noReport: { type: boolean }
        position: { type: integer }
        groupName: { type: string }
        notes: { type: string }
        website: { type: string }
        createdAt: { type: string }
        currencyCode: { type: string }
        currencySymbol: { type: string }
        currencySymbolPrefix: { type: boolean }
        currencyDecimalChar: { type: string }
        currencyGroupChar: { type: string }
        currencyFracDigits: { type: integer }
      required:
        [id, name, type, currencyId, initialBalance, minimumBalance, balance, closed, position,
         currencyCode, currencySymbol, currencySymbolPrefix, currencyDecimalChar, currencyGroupChar, currencyFracDigits]
    AccountInput:
      type: object
      properties:
        name: { type: string }
        type:
          type: string
          enum: [bank, cash, checking, savings, creditcard, liability, asset, investment]
        currencyId: { type: integer, format: int64, description: "defaults to the wallet base currency" }
        institution: { type: string }
        number: { type: string }
        initialBalance: { type: integer, format: int64 }
        minimumBalance: { type: integer, format: int64 }
        closed: { type: boolean }
        noSummary: { type: boolean }
        noBudget: { type: boolean }
        noReport: { type: boolean }
        groupName: { type: string }
        notes: { type: string }
        website: { type: string }
      required: [name, type]
    Category:
      type: object
      properties:
        id: { type: integer, format: int64 }
        parentId: { type: integer, format: int64, nullable: true }
        name: { type: string }
        isIncome: { type: boolean }
        noBudget: { type: boolean }
      required: [id, name, isIncome, noBudget]
    CategoryInput:
      type: object
      properties:
        name: { type: string }
        parentId: { type: integer, format: int64, nullable: true }
        isIncome: { type: boolean }
        noBudget: { type: boolean }
      required: [name]
    CategoryUsage:
      type: object
      properties:
        subcategories: { type: integer, format: int64 }
        payees: { type: integer, format: int64 }
        transactions: { type: integer, format: int64 }
      required: [subcategories, payees, transactions]
    Payee:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        defaultCategoryId: { type: integer, format: int64, nullable: true }
        defaultPaymentMode: { type: integer, format: int64, nullable: true }
      required: [id, name]
    PayeeInput:
      type: object
      properties:
        name: { type: string }
        defaultCategoryId: { type: integer, format: int64, nullable: true }
        defaultPaymentMode: { type: integer, format: int64, nullable: true }
      required: [name]
    MergeRequest:
      type: object
      properties:
        targetId: { type: integer, format: int64 }
      required: [targetId]
    Split:
      type: object
      properties:
        categoryId: { type: integer, format: int64, nullable: true }
        amount: { type: integer, format: int64 }
        memo: { type: string }
      required: [amount]
    Transaction:
      type: object
      properties:
        id: { type: integer, format: int64 }
        accountId: { type: integer, format: int64 }
        date: { type: string }
        amount: { type: integer, format: int64 }
        paymentMode: { type: integer }
        status: { type: integer }
        info: { type: string }
        payeeId: { type: integer, format: int64, nullable: true }
        categoryId: { type: integer, format: int64, nullable: true }
        memo: { type: string }
        isSplit: { type: boolean }
        tags: { type: array, items: { type: string } }
        splits: { type: array, items: { $ref: "#/components/schemas/Split" } }
        payeeName: { type: string }
        categoryName: { type: string }
        transferId: { type: integer, format: int64, description: "set when the transaction is one leg of an internal transfer" }
        transferAccountId: { type: integer, format: int64, description: "the counterpart leg's account" }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, accountId, date, amount, paymentMode, status, info, memo, isSplit, tags]
    TransactionInput:
      type: object
      properties:
        accountId: { type: integer, format: int64 }
        date: { type: string, description: "YYYY-MM-DD" }
        amount: { type: integer, format: int64, description: "signed minor units" }
        paymentMode: { type: integer, description: "0..11" }
        status: { type: integer, description: "0 none, 1 cleared, 2 reconciled, 3 remind, 4 void" }
        info: { type: string }
        payeeId: { type: integer, format: int64, nullable: true }
        categoryId: { type: integer, format: int64, nullable: true }
        memo: { type: string }
        tags: { type: array, items: { type: string } }
        splits: { type: array, items: { $ref: "#/components/schemas/Split" } }
      required: [accountId, date, amount]
    Transfer:
      type: object
      properties:
        id: { type: integer, format: int64 }
        fromAccountId: { type: integer, format: int64 }
        toAccountId: { type: integer, format: int64 }
        date: { type: string }
        fromAmount: { type: integer, format: int64, description: "positive magnitude in the source account currency" }
        toAmount: { type: integer, format: int64, description: "positive magnitude in the destination account currency" }
        memo: { type: string }
        status: { type: integer }
        txnFromId: { type: integer, format: int64 }
        txnToId: { type: integer, format: int64 }
      required: [id, fromAccountId, toAccountId, date, fromAmount, toAmount, memo, status, txnFromId, txnToId]
    TransferInput:
      type: object
      properties:
        fromAccountId: { type: integer, format: int64 }
        toAccountId: { type: integer, format: int64 }
        date: { type: string, description: "YYYY-MM-DD" }
        fromAmount: { type: integer, format: int64, description: "positive minor units in the source currency" }
        toAmount: { type: integer, format: int64, description: "positive minor units in the destination currency; defaults to fromAmount" }
        memo: { type: string }
        status: { type: integer, description: "0 none, 1 cleared, 2 reconciled, 3 remind, 4 void" }
      required: [fromAccountId, toAccountId, date, fromAmount]
