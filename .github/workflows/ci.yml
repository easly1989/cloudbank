name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: golangci-lint
        # Build golangci-lint from source with the project's Go toolchain so its
        # build-time Go version always matches the module's target (prebuilt
        # binaries lag behind new Go releases and refuse newer module targets).
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          "$(go env GOPATH)/bin/golangci-lint" run ./...
      - name: Test
        run: go test ./... -race -count=1
      - name: Build
        run: CGO_ENABLED=0 go build ./...

  web:
    name: Web (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Generate API types
        run: npm run gen:api
      - name: Check generated API types are up to date
        run: git diff --exit-code src/api/schema.d.ts
      - name: Lint (eslint + prettier)
        run: npm run lint
      - name: i18n key parity
        run: npm run check:i18n
      - name: Typecheck + build
        run: npm run build
      - name: Test
        run: npm run test
