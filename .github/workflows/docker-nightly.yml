name: Docker nightly

# Every push to main publishes a nightly image. Per the project's tag
# convention, the nightly is tagged `:latest` (NOT stable — `:main` is stable,
# published by release.yml).

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-nightly
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/easly1989/cloudbank

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=nightly-${{ steps.vars.outputs.sha }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
