# golangci-lint v2 configuration. Conservative set: the default linters plus a
# few high-signal additions. Formatters (gofmt, goimports) are separate in v2.
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
