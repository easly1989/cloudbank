version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/store/migrations"
    queries: "internal/store/queries"
    gen:
      go:
        package: "db"
        out: "internal/store/db"
        emit_json_tags: false
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "INTEGER"
            go_type: "int64"
